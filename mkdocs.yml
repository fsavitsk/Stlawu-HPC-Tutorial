site_name: Stlawu HPC Cluster User Guide
theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs      # Enables the top horizontal menu
    - navigation.sections  # (Optional) Makes the left sidebar look grouped
    - navigation.expand    # (Optional) Keeps the left menu expanded by default
    - search.share    # Built-in search bar
    - content.code.copy    # Adds the "Copy to Clipboard" button
    - content.code.annotate  # This enables code annotations/titles

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Getting Started:
    - Overview: gettingstarted/overview.md
    - Logging in: gettingstarted/loggingin.md
    - Copying Files: gettingstarted/copyingfiles.md
  - Resources: 
    - Cluster Info: resources/clusterinfo.md
    - Monitoring Software: resources/monitoring.md
  - Documentation: 
    - Slurm Tutorial: documentation/documentation.md
  - Tutorials:
    - Submitting a Job: tutorials/submitjob.md
    - Tensorflow CPU: tutorials/tensorcpu.md
    - Tensorflow GPU: tutorials/tensorgpu.md
    - PyTorch: tutorials/pytorch.md
  - Help: help.md
